<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>
    (function () {
      try {
        document.documentElement.dataset.theme = localStorage.getItem("ta_theme") === "light" ? "light" : "dark";
        var raw = localStorage.getItem("ta_hub_settings");
        if (raw) {
          var o = JSON.parse(raw);
          if (o && o.accent) document.documentElement.dataset.accent = o.accent;
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
  <title>Page not found · THTLabs</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
  <style>
    .err-wrap { max-width: 520px; margin: 12vh auto; padding: 24px; text-align: center; }
    .err-wrap h1 { font-size: 1.5rem; margin: 0 0 12px; color: var(--gold-a); }
    .err-wrap p { margin: 0 0 20px; color: var(--text-b); line-height: 1.45; }
  </style>
</head>
<body>
  <main class="err-wrap">
    <h1>Page not found</h1>
    <p>That link does not exist on this site. Go back to the minigames hub and pick a game from there.</p>
    <a class="gold-btn" href="./index.html">Back to hub</a>
  </main>
</body>
</html>
