<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="ta-game-help" content="Choose the correct spelling each round to build your score.">
  <meta name="ta-hub-game" content="Spell Sprint">
  <link rel="stylesheet" href="../../js/ta-game-mascot.css">
  <title>Spell Sprint</title>

<body class="ta-game-page">
  <main class="game-shell">
    <a href="../../index.html?resume=1" class="gold-btn back-link">Back to Hub</a>
    <h1>Spell Sprint</h1>
    <p class="ta-subtitle">Nine quick spelling snaps — trust what looks right.</p>
    <p id="hud" class="hud ta-hud-bar">Round 0 / 9 · Score: 0</p>

    <div id="answers" class="answers"></div>

    <p id="personalBest" class="personal-best-line"></p>
  </main>
