<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="ta-game-help" content="Tap Left or Right to switch lanes and dodge obstacles. Survive as long as you can.">
  <meta name="ta-hub-game" content="Hallway Dash">
  <title>Hallway Dash</title>
  <link rel="stylesheet" href="../../js/ta-game-mascot.css">
  <link rel="stylesheet" href="../../styles.css">

<body class="ta-game-page">
  <main class="game-shell">
    <a href="../../index.html?resume=1" class="gold-btn back-link">Back to Hub</a>

    <p class="ta-subtitle">Swipe lanes — dodge clutter coming down the corridor.</p>
    <div id="hud" class="ta-hud-bar" role="status">Score: 0</div>

      <button id="leftBtn" class="gold-btn">Left</button>
      <button id="rightBtn" class="gold-btn">Right</button>
    </div>
    <p id="personalBest" class="personal-best-line"></p>  </main>
